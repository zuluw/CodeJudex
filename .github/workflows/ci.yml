name: CodeJudex CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 
        cache: true
        cache-dependency-path: CodeJudex.slnx

    - name: Restore dependencies
      run: dotnet restore CodeJudex.slnx

    - name: Build
      run: dotnet build CodeJudex.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test tests/CodeJudex.Audit.UnitTests/CodeJudex.Audit.UnitTests.csproj --no-build --configuration Release --verbosity normal
  build-frontend:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/CodeJudex.Web/package-lock.json

    - name: Install dependencies
      working-directory: src/CodeJudex.Web
      run: npm ci --no-audit

    - name: Build
      working-directory: src/CodeJudex.Web
      run: npm run build