name: CodeJudex CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' 

    - name: Restore dependencies
      run: dotnet restore CodeJudex.slnx

    - name: Build
      run: dotnet build CodeJudex.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test tests/CodeJudex.Audit.UnitTests/CodeJudex.Audit.UnitTests.csproj --no-build --configuration Release --verbosity normal