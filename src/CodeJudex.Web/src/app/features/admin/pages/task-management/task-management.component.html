<div class="max-w-6xl mx-auto px-8 py-12 space-y-10 antialiased">
  
  <header class="flex justify-between items-center border-b border-slate-900 pb-8">
    <div>
      <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Task Repository Management</h1>
      <p class="text-slate-500 text-sm font-medium mt-1 uppercase tracking-widest">Create and configure technical challenges</p>
    </div>
    <button (click)="toggleCreateMode()" 
            class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-black rounded uppercase tracking-widest transition-all">
      {{ isCreateMode ? 'Cancel Operation' : 'New Challenge' }}
    </button>
  </header>

  @if (isCreateMode) {
    <section class="glass-card p-10 border-blue-500/20 animate-in fade-in slide-in-from-top-4 duration-300">
      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div class="space-y-6">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">General Configuration</h3>
            
            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Challenge Title</label>
              <input formControlName="title" type="text" placeholder="e.g. Optimize Binary Search"
                     class="w-full bg-slate-950 border border-slate-800 rounded px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors">
            </div>

            <div>
              <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Difficulty Level</label>
              <select formControlName="difficulty" 
                      class="w-full bg-slate-950 border border-slate-800 rounded px-4 py-3 text-white focus:border-blue-500 outline-none transition-colors uppercase text-xs font-bold">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </div>
          </div>

          <div class="space-y-6">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest">Resource Limits (Docker)</h3>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">RAM (MB)</label>
                <input formControlName="memoryLimit" type="number" 
                       class="w-full bg-slate-950 border border-slate-800 rounded px-4 py-3 text-white font-mono">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">CPU Time (ms)</label>
                <input formControlName="cpuLimit" type="number" 
                       class="w-full bg-slate-950 border border-slate-800 rounded px-4 py-3 text-white font-mono">
              </div>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Technical Description (Markdown supported)</label>
          <textarea formControlName="description" rows="5"
                    class="w-full bg-slate-950 border border-slate-800 rounded px-4 py-3 text-white font-mono text-sm focus:border-blue-500 outline-none transition-colors"
                    placeholder="Describe the problem, input/output constraints..."></textarea>
        </div>

        <div class="pt-6 border-t border-slate-900">
          <button type="submit" [disabled]="taskForm.invalid"
                  class="btn-primary w-full py-4 text-xs font-black uppercase tracking-[0.3em] disabled:opacity-30">
            Commit Task to System
          </button>
        </div>
      </form>
    </section>
  } @else {
    <div class="glass-card overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-900/50 border-b border-slate-800">
            <th class="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">ID</th>
            <th class="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Title</th>
            <th class="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Difficulty</th>
            <th class="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Status</th>
            <th class="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-800/50">
          @for (task of tasks; track task.id) {
            <tr class="hover:bg-slate-800/20 transition-colors">
              <td class="p-5 font-mono text-xs text-slate-600">{{task.id}}</td>
              <td class="p-5 font-bold text-white text-sm">{{task.title}}</td>
              <td class="p-5 text-center">
                <span class="text-[10px] font-bold px-2 py-1 rounded"
                      [ngClass]="{'text-green-500 bg-green-500/10': task.difficulty === 'Easy', 'text-yellow-500 bg-yellow-500/10': task.difficulty === 'Medium', 'text-red-500 bg-red-500/10': task.difficulty === 'Hard'}">
                  {{task.difficulty}}
                </span>
              </td>
              <td class="p-5 text-center">
                <span class="text-[10px] text-slate-400 font-mono">{{task.status}}</span>
              </td>
              <td class="p-5 text-right space-x-3">
                <button class="text-blue-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">Edit</button>
                <button class="text-red-500/50 hover:text-red-500 transition-colors text-xs font-bold uppercase tracking-widest">Drop</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }

</div>
