<div class="max-w-4xl mx-auto px-8 py-24 space-y-16 antialiased">
  
  <header class="text-center space-y-4">
    <h2 class="text-xs font-black text-blue-500 uppercase tracking-[0.4em]">Development & Engineering</h2>
    <h1 class="text-5xl font-black text-white tracking-tighter uppercase">Platform Architect</h1>
  </header>

  <section class="glass-card p-12 border-slate-800 flex flex-col md:flex-row gap-12 items-center">
    <div class="w-48 h-48 bg-slate-800 rounded-3xl border border-slate-700 flex-shrink-0 overflow-hidden shadow-2xl">
       <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sashka" alt="Alexander Mikhalkov">
    </div>

    <div class="space-y-6 text-center md:text-left">
      <div>
        <h3 class="text-3xl font-bold text-white tracking-tight">{{leadDeveloper.name}}</h3>
        <p class="text-blue-500 font-mono text-sm uppercase font-black tracking-widest mt-1">
          {{leadDeveloper.role}}
        </p>
      </div>

      <p class="text-slate-400 leading-relaxed font-medium">
        {{leadDeveloper.bio}}
      </p>

      <div class="flex flex-wrap gap-6 justify-center md:justify-start">
        <div class="space-y-1">
          <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Focus</p>
          <p class="text-xs text-slate-300 font-mono">{{leadDeveloper.specialization}}</p>
        </div>
        <div class="space-y-1">
          <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Availability</p>
          <p class="text-xs text-green-500 font-mono">Open to contribution</p>
        </div>
      </div>

      <div class="pt-4 flex gap-4 justify-center md:justify-start">
        <button class="btn-primary px-8 text-xs uppercase tracking-widest">GitHub</button>
        <button class="btn-secondary px-8 text-xs uppercase tracking-widest border-slate-800">CV</button>
      </div>
    </div>
  </section>

</div>
