<div class="container mx-auto px-8 py-20 flex justify-center">
  <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-xl border border-slate-800 p-10 rounded-xl shadow-2xl">
    <div class="mb-10 text-center">
      <h1 class="text-2xl font-bold text-white mb-2 uppercase tracking-tight">Create Profile</h1>
      <p class="text-slate-500 text-sm">Join the intelligent education ecosystem.</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Full Name</label>
        <input type="text" placeholder="John Doe" 
               class="w-full bg-slate-950/50 border border-slate-800 rounded px-4 py-3 text-white focus:outline-none focus:border-blue-600 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Email Address</label>
        <input type="email" placeholder="user@codejudex.com" 
               class="w-full bg-slate-950/50 border border-slate-800 rounded px-4 py-3 text-white focus:outline-none focus:border-blue-600 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Password</label>
        <input type="password" placeholder="••••••••" 
               class="w-full bg-slate-950/50 border border-slate-800 rounded px-4 py-3 text-white focus:outline-none focus:border-blue-600 transition-colors">
      </div>

      <button class="btn-primary w-full py-4 uppercase text-sm tracking-widest mt-4">
        Register Account
      </button>
    </div>
    
    <div class="mt-8 pt-6 border-t border-slate-800 text-center text-xs">
      <span class="text-slate-500">Already have an account? </span>
      <a routerLink="/auth/login" class="text-blue-500 hover:underline cursor-pointer">Sign In</a>
    </div>
  </div>
</div>
