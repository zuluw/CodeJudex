<div class="container mx-auto px-8 py-20 flex justify-center">
  <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-xl border border-slate-800 p-10 rounded-xl shadow-2xl">
    <div class="mb-10 text-center">
      <h1 class="text-2xl font-bold text-white mb-2 uppercase tracking-tight">System Login</h1>
      <p class="text-slate-500 text-sm">Access the CodeJudex unified workspace.</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Email Address</label>
        <input type="email" placeholder="user@codejudex.com" 
               class="w-full bg-slate-950/50 border border-slate-800 rounded px-4 py-3 text-white focus:outline-none focus:border-blue-600 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 tracking-widest">Password</label>
        <input type="password" placeholder="••••••••" 
               class="w-full bg-slate-950/50 border border-slate-800 rounded px-4 py-3 text-white focus:outline-none focus:border-blue-600 transition-colors">
      </div>

      <button (click)="login()" 
              class="btn-primary w-full py-4 uppercase text-sm tracking-widest">
        Authorize
      </button>
    </div>

    <div class="mt-8">
      <div class="relative flex items-center mb-6">
        <div class="flex-grow border-t border-slate-800"></div>
        <span class="flex-shrink mx-4 text-xs font-bold text-slate-600 uppercase tracking-widest">Or continue with</span>
        <div class="flex-grow border-t border-slate-800"></div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button class="btn-secondary py-3 flex items-center justify-center gap-2 text-xs">
          <span>GITHUB</span>
        </button>
        <button class="btn-secondary py-3 flex items-center justify-center gap-2 text-xs">
          <span>GOOGLE</span>
        </button>
      </div>
    </div>

    <div class="mt-10 pt-6 border-t border-slate-800 text-center text-xs">
      <span class="text-slate-500">No account? </span>
      <a routerLink="/auth/register" class="text-blue-500 hover:underline cursor-pointer">Register Profile</a>
    </div>
  </div>
</div>
